<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas_4</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Form Cek Nilai</h2>
        <div class="form-group">
            <label for="nim">NIM:</label>
            <input type="text" id="nim" placeholder="Masukkan NIM">
        </div>

        <div class="form-group">
            <label for="nilai">Nilai Mata Kuliah:</label>
            <input type="number" id="nilai" placeholder="0 - 100">
        </div>

        <button id="btnCek">Cek Nilai</button>

        <div id="hasil" class="result-area">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
